<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Автосалон</title>
        <link rel="stylesheet" href="styles/main.css" />
        <link rel="stylesheet" href="styles/color.css" />
    </head>
    <body>
        <header>
            <div class="header_img">
                <img src="assets/logo/logoBMW.png" alt="Лого автомобиля" />
            </div>
        </header>
        <main>
            <div class="main-top">
                <div class="back_text"></div>
                <div class="front_image">
                    <img src="assets/Cars/M4.png" alt="Автомобиль" />
                </div>
            </div>
            <div class="bottom_text">
                <div class="name_car"></div>
                <div class="characteristic"></div>
                <div class="start_engine">
                    <button id="engine">Звук двигателя</button>
                </div>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
